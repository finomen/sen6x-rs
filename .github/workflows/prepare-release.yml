name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep '^version' sen6x-driver/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate commit diff since last tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git log --format="%s" > commit_messages.txt
          else
            git log "${LAST_TAG}..HEAD" --format="%s" > commit_messages.txt
          fi

      - name: Generate new version
        id: semver
        uses: juztcode/generate-semver@1.0.0
        with:
          branch-diff-file: commit_messages.txt
          previous-version: ${{ steps.current_version.outputs.version }}

      - name: Sanitize version
        id: version
        run: |
          RAW="${{ steps.semver.outputs.generated-version }}"
          CLEAN=$(echo "$RAW" | grep -oP '^\d+\.\d+\.\d+')
          echo "version=$CLEAN" >> "$GITHUB_OUTPUT"

  prepare:
    needs: calculate-version
    runs-on: ubuntu-latest
    env:
      NEW_VERSION: ${{ needs.calculate-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Shallow clone intentional: allows smichard/conventional_changelog
          # to run its internal `git fetch --unshallow` without error.

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: git checkout -b release_${{ env.NEW_VERSION }}

      - name: Update versions in Cargo.toml files
        run: |
          sed -i "0,/^version = /s/^version = \"[^\"]*\"/version = \"$NEW_VERSION\"/" sen6x-driver/Cargo.toml
          sed -i "0,/^version = /s/^version = \"[^\"]*\"/version = \"$NEW_VERSION\"/" sen6x-macros/Cargo.toml
          sed -i "s/sen6x-macros = { version = \"[^\"]*\"/sen6x-macros = { version = \"$NEW_VERSION\"/" sen6x-driver/Cargo.toml

      - name: Commit version bump
        run: |
          git add sen6x-driver/Cargo.toml sen6x-macros/Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION"

      - name: Push release branch
        run: git push origin release_${{ env.NEW_VERSION }}

      - name: Generate changelog
        uses: smichard/conventional_changelog@2.0.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog to release branch
        run: |
          git fetch origin release_${{ env.NEW_VERSION }}
          git add CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: update changelog for $NEW_VERSION"
          fi
          git push origin release_${{ env.NEW_VERSION }}

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore(release): $NEW_VERSION" \
            --body "Automated release PR for version $NEW_VERSION" \
            --base master \
            --head "release_$NEW_VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build dependencies
        uses: Swatinem/rust-cache@v2